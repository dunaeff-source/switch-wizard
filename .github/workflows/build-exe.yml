name: build-exe

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --name switch-wizard
          --hidden-import serial.tools.list_ports
          main.py

      - name: Copy profiles.yaml
        run: copy /Y profiles.yaml dist\profiles.yaml
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: switch-wizard-windows
          path: |
            dist/switch-wizard.exe
            dist/profiles.yaml
          if-no-files-found: error
