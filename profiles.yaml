dlink_legacy:
  title: "D-Link DES-3xxx / DGS-3xxx (СТАРЫЙ CLI, не для DGS-1250!)"
  baudrate: 115200
  prompts: ["#", ">", ":admin#"]
  enable: []
  error_patterns: ["Next possible completions", "Available commands", "Invalid"]
  auto_answers:
    - match: "\\(y/n\\)"
      send: "y"
    - match: "All changes will be lost"
      send: "y"
  sections:
    enter_config: []
    hostname: ["config snmp system_name {{hostname}}"]
    vlans:
      foreach: vlans
      commands:
        - "create vlan {{vlan_name}} tag {{vlan_id}}"
    mgmt:
      - "config ipif System vlan {{mgmt_vlan_name}} ipaddress {{mgmt_ip}}/{{mgmt_prefix}}"
      - "create iproute default {{gateway}}"
    user:
      - cmd: "create account admin {{username}}"
        replies: ["{{password}}", "{{password}}"]
    ssh:
      - "enable ssh"
    snmp:
      - "enable snmp"
      - "create snmp community {{snmp_ro}} view CommunityView read_only"
      # Удаление заводских community — раскомментировать после проверки на
      # тестовом коммутаторе (если записи нет, устройство вернёт ошибку):
      # - "delete snmp community public"
      # - "delete snmp community private"
    ports_access:
      foreach: port_groups_access
      commands:
        - "config vlan vlanid {{vlan}} add untagged {{port_range}}"
        - "config port_vlan {{port_range}} pvid {{vlan}}"
    ports_trunk:
      foreach: port_groups_trunk
      commands:
        - "config vlan vlanid {{vlans_csv}} add tagged {{port_range}}"
    save:
      - "save"
