# ============================================================================
#  ПРОФИЛИ КОММУТАТОРОВ
#  Это единственный файл, который нужно править при добавлении новой модели.
#  Программу пересобирать НЕ нужно — profiles.yaml лежит рядом с .exe.
#
#  Плейсхолдеры: {{hostname}} {{mgmt_ip}} {{mgmt_mask}} {{mgmt_prefix}}
#                {{gateway}} {{mgmt_vlan}} {{username}} {{password}}
#                {{snmp_ro}} {{vlan_id}} {{vlan_name}} {{port}} {{iface}}
#                {{port_range}} {{vlan}} {{vlans_csv}}
#
#  Команда может быть строкой или объектом:
#     - "hostname {{hostname}}"
#     - cmd: "create account admin {{username}}"
#       replies: ["{{password}}", "{{password}}"]   # ответы на доп. запросы
# ============================================================================

# ============================================================================
#  КОРПОРАТИВНЫЕ ЗНАЧЕНИЯ ПО УМОЛЧАНИЮ
#  Подставляются в поля мастера при запуске. Единый стандарт для всех
#  коммутаторов организации. Меняются здесь, программу пересобирать не нужно.
# ============================================================================
defaults:
  # Учётная запись, которая СОЗДАЁТСЯ на коммутаторе
  username: "root"
  password: "aaebkgb"
  snmp_ro: "troitsk77"
  # Учётные данные для ВХОДА в консоль нового коммутатора (заводские).
  # На DGS-1250 из коробки это admin / admin.
  login_username: "admin"
  login_password: "admin"
  snmp_mandatory: true      # SNMP настраивается всегда, галочку снять нельзя
  lock_credentials: false   # true — запретить оператору править логин/пароль/community

dlink_dgs1250:
  title: "D-Link DGS-1250-28X/A1A (industrial-like CLI)"
  detect: ["DGS-1250"]        # признаки в баннере/выводе для авто-определения
  baudrate: 115200
  prompts: ["#", ">"]
  enable: ["enable"]
  port_prefix: "1/0/"
  ports_total: 28              # всего физических портов (для расчёта абонентских)
  # --- команды для отдельных функций (читаются программой напрямую) ---
  # Сброс к заводским. reset system спрашивает подтверждение — программа ответит y.
  reset:
    - "reset system"
  show_running: "show running-config"   # для автобэкапа
  verify: "show ip interface brief"      # проверка, что IP применился
  facts: "show version"                  # для чтения MAC/версии в реестр
  error_patterns:
    - "Next possible completions"
    - "Available commands"
    - "Invalid input"
    - "Unrecognized command"
    - "Ambiguous command"
    - "Incomplete command"
    - "ERROR"            # напр. "ERROR: Conflicted subnet addresses" — тихий отказ
    - "Conflicted"
  auto_answers:
    - match: "\\[y/n\\]"
      send: "y"
    - match: "\\[yes/no\\]"
      send: "yes"
    - match: "Destination filename"
      send: "y"
  sections:
    enter_config: ["configure terminal"]
    hostname: ["snmp-server name {{hostname}}"]
    vlans:
      foreach: vlans
      commands:
        - "vlan {{vlan_id}}"
        - "name {{vlan_name}}"
        - "exit"
    mgmt:
      # DGS-1250 держит один управляющий IP. Заводской 10.90.90.90 стоит с маской
      # 255.0.0.0 (/8) и занимает всю сеть 10.0.0.0/8 — из-за этого адрес 10.79.x на
      # другом VLAN отклоняется («ERROR: Conflicted subnet addresses»). Поэтому
      # сначала снимаем заводской адрес с VLAN 1, затем ставим наш на управляющий
      # VLAN. На уже настроенном (не заводском) коммутаторе, где 10.90.90.90 уже нет,
      # две строки снятия можно закомментировать.
      - "interface vlan 1"
      - "no ip address 10.90.90.90 255.0.0.0"
      - "exit"
      - "interface vlan {{mgmt_vlan}}"
      - "ip address {{mgmt_ip}} {{mgmt_mask}}"
      - "exit"
      - "ip route 0.0.0.0 0.0.0.0 {{gateway}}"
    user:
      - "username {{username}} password {{password}}"
      # На прошивке этого DGS-1250 отдельная команда "username ... privilege 15"
      # НЕ поддерживается (CLI отвечает "Invalid input detected"). Локальный
      # пользователь, созданный с паролем, и так получает доступ к управлению,
      # поэтому уровень привилегий отдельной командой не задаётся. Если на другой
      # прошивке команда поддерживается — раскомментируйте строку ниже:
      # - "username {{username}} privilege 15"
      # Удаление заводской учётки admin — включать ТОЛЬКО после того, как
      # убедились, что вход под новой учёткой работает:
      # - "no username admin"
    ssh:
      # генерация ключа выполняется в привилегированном режиме и занимает время
      - cmd: "end"
      - cmd: "crypto key generate rsa modulus 1024"
        timeout: 120
      - cmd: "configure terminal"
      - cmd: "ip ssh server"
      - cmd: "line ssh"
      - cmd: "login local"
      - cmd: "exit"
    snmp:
      - "snmp-server community {{snmp_ro}} ro"
      # Удаление заводских community (если их нет, коммутатор вернёт ошибку):
      # - "no snmp-server community public"
      # - "no snmp-server community private"
    # Включение веб-интерфейса (по умолчанию на DGS-1250 выключен).
    # ТРЕБУЕТ ОБКАТКИ: точный синтаксис может отличаться. HTTP-строку при желании
    # можно закомментировать, оставив только HTTPS (secure-server).
    web:
      - "ip http server"
      - "ip http secure-server"
    ports_access:
      foreach: port_groups_access
      commands:
        - "interface range ethernet {{iface_range}}"
        - "switchport mode access"
        - "switchport access vlan {{vlan}}"
        - "exit"
    ports_trunk:
      foreach: port_groups_trunk
      commands:
        - "interface range ethernet {{iface_range}}"
        - "switchport mode trunk"
        - "switchport trunk allowed vlan {{vlans_csv}}"
        - "exit"
    # --- Изоляция абонентов (traffic segmentation) ---
    # Абонентские порты (все, кроме аплинков) могут слать трафик ТОЛЬКО на аплинки,
    # то есть друг друга не видят. {{sub_ports_range}} и {{uplink_range}} программа
    # подставляет сама. ТРЕБУЕТ ОБКАТКИ: синтаксис traffic-segmentation у D-Link
    # между сериями отличается.
    segmentation:
      - "interface range ethernet {{sub_ports_range}}"
      - "traffic-segmentation forward interface ethernet {{uplink_range}}"
      - "exit"
    # --- Защита от петель (Loopback Detection) на абонентских портах ---
    # ТРЕБУЕТ ОБКАТКИ.
    loopback:
      - "loopback-detection"
      - "interface range ethernet {{sub_ports_range}}"
      - "loopback-detection"
      - "exit"
    # --- Storm control на абонентских портах (ограничение штормов) ---
    # Порог 5% — при необходимости поправьте. ТРЕБУЕТ ОБКАТКИ.
    storm_control:
      - "interface range ethernet {{sub_ports_range}}"
      - "storm-control broadcast level 5"
      - "storm-control multicast level 5"
      - "exit"
    save:
      - "end"
      - cmd: "copy running-config startup-config"
        timeout: 90

eltex_mes:
  title: "Eltex MES (MES2300/3300/2400)"
  detect: ["Eltex", "MES23", "MES24", "MES21", "MES33", "MES-"]
  reset: ["delete startup-config", "reload"]     # ТРЕБУЕТ ОБКАТКИ
  show_running: "show running-config"
  verify: "show ip interface brief"
  baudrate: 115200
  prompts: ["#", ">"]
  enable: ["enable"]
  iface_template: "gigabitethernet1/0/{{port}}"
  error_patterns: ["Invalid input", "Unrecognized command", "% Incomplete"]
  auto_answers:
    - match: "\\(y/n\\)"
      send: "y"
    - match: "\\[y/n\\]"
      send: "y"
    - match: "Overwrite file"
      send: "y"
  sections:
    enter_config: ["configure terminal"]
    hostname: ["hostname {{hostname}}"]
    # Eltex MES (CLI в стиле Cisco-SBS): VLAN создаётся в режиме "vlan database",
    # а имя задаётся отдельно на "interface vlan". ТРЕБУЕТ ОБКАТКИ.
    vlans:
      foreach: vlans
      commands:
        - "vlan database"
        - "vlan {{vlan_id}}"
        - "exit"
        - "interface vlan {{vlan_id}}"
        - "name {{vlan_name}}"
        - "exit"
    mgmt:
      - "interface vlan {{mgmt_vlan}}"
      - "ip address {{mgmt_ip}} {{mgmt_mask}}"
      - "exit"
      - "ip default-gateway {{gateway}}"
    user:
      - "username {{username}} password {{password}} privilege 15"
    ssh:
      - "crypto key generate rsa"
      - "ip ssh server"
    snmp:
      - "snmp-server server"
      - "snmp-server community {{snmp_ro}} ro"
    ports_access:
      foreach: ports_each_access
      commands:
        - "interface {{iface}}"
        - "switchport mode access"
        - "switchport access vlan {{vlan}}"
        - "exit"
    ports_trunk:
      foreach: ports_each_trunk
      commands:
        - "interface {{iface}}"
        - "switchport mode trunk"
        - "switchport trunk allowed vlan add {{vlans_csv}}"
        - "exit"
    save:
      - "end"
      - "write memory"

tplink_t:
  title: "TP-Link T1500/T1600/T2600"
  detect: ["TP-LINK", "TP-Link", "JetStream", "T1500", "T1600", "T2600"]
  reset: ["reset"]                                # ТРЕБУЕТ ОБКАТКИ
  show_running: "show running-config"
  baudrate: 38400
  prompts: ["#", ">"]
  enable: ["enable"]
  iface_template: "gigabitEthernet 1/0/{{port}}"
  error_patterns: ["Invalid input", "Unknown command", "Ambiguous"]
  auto_answers:
    - match: "\\(Y/N\\)"
      send: "Y"
  sections:
    enter_config: ["configure"]
    hostname: ["hostname {{hostname}}"]
    vlans:
      foreach: vlans
      commands:
        - "vlan {{vlan_id}}"
        - "name {{vlan_name}}"
        - "exit"
    mgmt:
      - "interface vlan {{mgmt_vlan}}"
      - "ip address {{mgmt_ip}} {{mgmt_mask}}"
      - "exit"
      - "ip route 0.0.0.0 0.0.0.0 {{gateway}}"
    user:
      - "user name {{username}} privilege admin password {{password}}"
    ssh:
      - "ip ssh server enable"
    snmp:
      - "snmp-server"
      - "snmp-server community {{snmp_ro}} read-only"
    ports_access:
      foreach: ports_each_access
      commands:
        - "interface {{iface}}"
        - "switchport general allowed vlan {{vlan}} untagged"
        - "switchport pvid {{vlan}}"
        - "exit"
    ports_trunk:
      foreach: ports_each_trunk
      commands:
        - "interface {{iface}}"
        - "switchport general allowed vlan {{vlans_csv}} tagged"
        - "exit"
    save:
      - "end"
      - "copy running-config startup-config"

